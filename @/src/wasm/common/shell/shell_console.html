<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="/static/wasm/css/shell.css">
</head>
<body data-default-tab="console">

<div id="loading-screen">
  <div class="loader-logo">加载中…</div>
  <div class="loader-spinner"></div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-status" id="loader-status">Initializing…</div>
</div>

<div id="main-ui">
  <div id="tabs">
    <button class="tab-btn" data-tab="canvas">gui</button>
    <button class="tab-btn active" data-tab="console">console</button>
  </div>

  <div id="tab-contents">
    <div id="canvas-tab" class="tab-content">
      <div class="canvas-wrapper">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" aria-label="Canvas"></canvas>
      </div>
    </div>

    <div id="console-tab" class="tab-content active">
      <div class="panel panel-left"><div class="terminal" id="terminal-wasm"></div></div>
      <div class="panel-divider" id="panel-divider"></div>
      <div class="panel panel-right"><div class="terminal" id="terminal-log"></div></div>
    </div>
  </div>

  <div id="toolbar-trigger"></div>
  <div id="toolbar">
    <span class="toolbar-title"></span>
    <div class="toolbar-sep"></div>
    <button class="btn" id="btn-playpause" onclick="togglePause()" title="暂停">
      <svg id="icon-pause" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></svg>
      <svg id="icon-play"  viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M3 2l10 6-10 6V2z"/></svg>
      <span id="playpause-text">暂停</span>
    </button>
    <div class="toolbar-sep"></div>
    <button class="btn" id="btn-fullscreen" onclick="goFullscreen()" title="全屏">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 5V1h4M11 1h4v4M15 11v4h-4M5 15H1v-4"/></svg><span>全屏</span>
    </button>
    <div class="toolbar-spacer"></div>
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready</span>
  </div>
</div>

<!-- Load order: terminal.js (xterm) → shell.js (Module) → Emscripten (extends Module) -->
<script src="/static/wasm/js/terminal.js"></script>
<script src="/static/wasm/js/shell.js"></script>

<!-- Emscripten generated code: extends the window.Module created by shell.js -->
{{{ SCRIPT }}}
</body>
</html>
