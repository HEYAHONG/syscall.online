<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日出日落时间查询</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 12px;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #e0e0e0;
            font-size: 0.9rem;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1 1 calc(33.333% - 8px);
            min-width: 90px;
        }
        input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        input[type="number"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #ffd700;
        }
        input::-webkit-inner-spin-button,
        input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.8;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            flex: 0 0 auto;
            padding: 14px 16px;
            min-width: 90px;
        }
        .btn-secondary:active {
            background: rgba(255,255,255,0.25);
        }
        .result-card {
            margin-top: 24px;
            display: none;
        }
        .result-card.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .time-display {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .time-box {
            flex: 1;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            min-width: 0;
        }
        .time-box.sunrise {
            background: linear-gradient(135deg, #ff9a56 0%, #ffcd67 100%);
            color: #1a1a2e;
        }
        .time-box.sunset {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #fff;
        }
        .time-label {
            font-size: 0.85rem;
            margin-bottom: 6px;
            opacity: 0.85;
        }
        .time-value {
            font-size: 1.8rem;
            font-weight: bold;
            word-break: break-all;
        }
        .time-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .info-item {
            text-align: center;
            padding: 8px 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            min-width: 0;
        }
        .info-label {
            font-size: 0.7rem;
            color: #aaa;
            margin-bottom: 2px;
        }
        .info-value {
            font-size: 0.8rem;
            font-weight: 600;
            word-break: break-all;
        }
        .error {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid #ff5252;
            color: #ff8a80;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .preset-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            justify-content: center;
        }
        .preset-btn {
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .preset-btn:active {
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 16px;
                border-radius: 12px;
            }
            h1 {
                font-size: 1.3rem;
                margin-bottom: 16px;
            }
            .preset-btns {
                gap: 6px;
                justify-content: flex-start;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }
            .preset-btns::-webkit-scrollbar {
                display: none;
            }
            .preset-btn {
                flex-shrink: 0;
                font-size: 0.8rem;
                padding: 6px 10px;
            }
            .form-row {
                gap: 8px;
            }
            .form-row .form-group {
                flex: 1 1 calc(50% - 4px);
                min-width: 0;
            }
            .form-row .form-group:last-child {
                flex: 1 1 100%;
            }
            .btn-group {
                flex-direction: column;
                gap: 8px;
            }
            .btn-secondary {
                flex: none;
                width: 100%;
            }
            .time-display {
                flex-direction: column;
                gap: 10px;
            }
            .time-box {
                padding: 16px 8px;
            }
            .time-value {
                font-size: 1.6rem;
            }
            .time-icon {
                font-size: 24px;
            }
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .info-label {
                font-size: 0.65rem;
            }
            .info-value {
                font-size: 0.75rem;
            }
        }

        /* Tablet */
        @media (min-width: 481px) and (max-width: 768px) {
            .time-value {
                font-size: 2rem;
            }
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Large screens */
        @media (min-width: 769px) {
            .container {
                padding: 30px;
            }
            h1 {
                font-size: 1.8rem;
                margin-bottom: 24px;
            }
            .form-group {
                margin-bottom: 18px;
            }
            .time-value {
                font-size: 2.2rem;
            }
            .info-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌅 日出日落时间查询</h1>
        
        <div class="preset-btns">
            <button class="preset-btn" onclick="setPreset('chengdu')">📍成都</button>
            <button class="preset-btn" onclick="setPreset('beijing')">📍北京</button>
            <button class="preset-btn" onclick="setPreset('shanghai')">📍上海</button>
            <button class="preset-btn" onclick="setPreset('guangzhou')">📍广州</button>
            <button class="preset-btn" onclick="setPreset('haerbin')">📍哈尔滨</button>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="lat">纬度 (°)</label>
                <input type="number" id="lat" step="0.0001" value="30.5728" placeholder="30.5728">
            </div>
            <div class="form-group">
                <label for="lon">经度 (°)</label>
                <input type="number" id="lon" step="0.0001" value="104.0668" placeholder="104.0668">
            </div>
            <div class="form-group">
                <label for="timezone">时区</label>
                <input type="number" id="timezone" value="8" placeholder="8">
            </div>
        </div>

        <div class="form-group">
            <label for="date">日期</label>
            <input type="date" id="date">
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="querySunriseSunset()">🔍 查询</button>
            <button class="btn btn-secondary" onclick="useToday()">📅今天</button>
        </div>

        <div id="result" class="result-card">
            <div class="time-display">
                <div class="time-box sunrise">
                    <div class="time-icon">🌅</div>
                    <div class="time-label">日出时间</div>
                    <div class="time-value" id="sunrise-time">--:--:--</div>
                </div>
                <div class="time-box sunset">
                    <div class="time-icon">🌇</div>
                    <div class="time-label">日落时间</div>
                    <div class="time-value" id="sunset-time">--:--:--</div>
                </div>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">纬度</div>
                    <div class="info-value" id="info-lat">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">经度</div>
                    <div class="info-value" id="info-lon">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">日期</div>
                    <div class="info-value" id="info-date">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">时区</div>
                    <div class="info-value" id="info-tz">-</div>
                </div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script src="./sunriseandsunset-api.js"></script>
</body>
</html>
