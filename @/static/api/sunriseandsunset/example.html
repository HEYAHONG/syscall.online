<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日出日落时间查询</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #e0e0e0;
        }
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 120px;
        }
        input[type="number"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #ffd700;
        }
        input::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.25);
        }
        .result-card {
            margin-top: 30px;
            display: none;
        }
        .result-card.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .time-display {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .time-box {
            flex: 1;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        .time-box.sunrise {
            background: linear-gradient(135deg, #ff9a56 0%, #ffcd67 100%);
            color: #1a1a2e;
        }
        .time-box.sunset {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #fff;
        }
        .time-label {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        .time-value {
            font-size: 2.5em;
            font-weight: bold;
        }
        .time-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .info-item {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .info-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .error {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid #ff5252;
            color: #ff8a80;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .preset-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .preset-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .preset-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌅 日出日落时间查询</h1>
        
        <div class="preset-btns">
            <button class="preset-btn" onclick="setPreset('chengdu')">📍 成都</button>
            <button class="preset-btn" onclick="setPreset('beijing')">📍 北京</button>
            <button class="preset-btn" onclick="setPreset('shanghai')">📍 上海</button>
            <button class="preset-btn" onclick="setPreset('guangzhou')">📍 广州</button>
            <button class="preset-btn" onclick="setPreset('haerbin')">📍 哈尔滨</button>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="lat">纬度 (°)</label>
                <input type="number" id="lat" step="0.0001" value="30.5728" placeholder="30.5728">
            </div>
            <div class="form-group">
                <label for="lon">经度 (°)</label>
                <input type="number" id="lon" step="0.0001" value="104.0668" placeholder="104.0668">
            </div>
            <div class="form-group">
                <label for="timezone">时区</label>
                <input type="number" id="timezone" value="8" placeholder="8">
            </div>
        </div>

        <div class="form-group">
            <label for="date">日期</label>
            <input type="date" id="date">
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="querySunriseSunset()">🔍 查询</button>
            <button class="btn btn-secondary" onclick="useToday()">📅 今天</button>
        </div>

        <div id="result" class="result-card">
            <div class="time-display">
                <div class="time-box sunrise">
                    <div class="time-icon">🌅</div>
                    <div class="time-label">日出时间</div>
                    <div class="time-value" id="sunrise-time">--:--:--</div>
                </div>
                <div class="time-box sunset">
                    <div class="time-icon">🌇</div>
                    <div class="time-label">日落时间</div>
                    <div class="time-value" id="sunset-time">--:--:--</div>
                </div>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">纬度</div>
                    <div class="info-value" id="info-lat">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">经度</div>
                    <div class="info-value" id="info-lon">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">日期</div>
                    <div class="info-value" id="info-date">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">时区</div>
                    <div class="info-value" id="info-tz">-</div>
                </div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script src="./sunriseandsunset-api.js"></script>
</body>
</html>
